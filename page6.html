<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>...</title>

  <style>

    body {
      margin: 0;
      padding: 0;

      background: black;

      width: 100%;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;

      object-fit: contain;

      opacity: 0;

      animation: fadeIn 2s forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

  </style>

</head>

<body>

  <video controls autoplay>
    <source src="final.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

</body>

</html>
