<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>...</title>

  <style>

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #0b0b0b, #1a1a1a);
      color: #e6e6e6;
      font-family: Arial, sans-serif;

      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      max-width: 700px;
      padding: 20px;
    }

    p {
      line-height: 1.8;
      margin: 20px 0;

      opacity: 0;
      animation: fadeIn 2s forwards;
    }

    p:nth-child(1) {
      animation-delay: 0.5s;
    }

    p:nth-child(2) {
      animation-delay: 1.5s;
    }

    p:nth-child(3) {
      animation-delay: 2.5s;
    }

    p:nth-child(4) {
      animation-delay: 3.5s;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

  </style>

</head>

<body>

  <div class="container">

    <p>
      I don’t expect a response from you, and there is no rush in reading this. Take your time.
    </p>

    <p>
      This isn’t something I wrote to start a conversation or to get you back.
    </p>

    <p>
      It’s simply everything I couldn’t say properly, put in one place.
    </p>

    <p>
      Whenever you’re ready, you can scroll.
    </p>

  </div>

</body>

</html>
